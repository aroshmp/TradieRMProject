version: '3.8'

services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 TradieRMProject.wsgi:application
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    networks:
      - tradie_network

volumes:
  static_volume:

networks:
  tradie_network:
    driver: bridge

